{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capital City Quiz</title>
  <link rel="stylesheet" href="{% static 'assets/styles/main.css' %}">
</head>

<body id="app">
  <form class="container" action="" method="">
    
    <div class="horizontal-container">
      <h3>
        Total Score:
        <span id="score">
           0
        </span>
      </h3>

    </div>

    <h1 id="countryName">
        <img src="" alt="" width="80px" >
        <h1> Country Name </h1>
    </h1>
    <div class="answer-container">
      <input type="text" name="answer" id="userInput" placeholder="Enter the capital" autofocus autocomplete="off">
      <input type="hidden" name="question_index" value="">
      <input type="hidden" name="total_score" value="">
    </div>
    <button type="submit">SUBMIT
        <!-- apply one span or the other -->
          <span class="checkmark">✔</span>
          <span class="cross" id="error">✖</span>
    </button>
  </form>
  
</body>

</html>
